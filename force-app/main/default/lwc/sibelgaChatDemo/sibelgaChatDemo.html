<template>
    <!-- Chat window (visible when open) -->
    <template if:true={isOpen}>
        <div class="chat-container">

            <!-- Header -->
            <div class="chat-header">
                <div class="agent-avatar">
                    <img class="avatar-img" src={lisaAvatarUrl} alt="Lisa" />
                    <span class={onlineDotClass}></span>
                </div>
                <div class="agent-info">
                    <span class="agent-name">Lisa</span>
                    <span class="agent-status">{agentStatusText}</span>
                </div>
                <div class="sibelga-wordmark">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M13 2L4.5 13.5H11L10 22L20.5 9.5H14L13 2Z"
                              fill="#fff" stroke="#fff" stroke-width="0.5" stroke-linejoin="round"/>
                    </svg>
                    <span class="wordmark-text">Sibelga</span>
                </div>
                <button class="header-close-btn" onclick={handleLauncherToggle} aria-label="Close chat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <!-- Messages -->
            <div class="chat-messages" lwc:ref="msgContainer">

                <!-- Connecting state -->
                <template if:true={isConnecting}>
                    <div class="connecting-state">
                        <div class="connecting-dots">
                            <span class="dot"></span>
                            <span class="dot"></span>
                            <span class="dot"></span>
                        </div>
                        <span class="connecting-text">Lisa is joining the chat…</span>
                    </div>
                </template>

                <!-- Messages -->
                <template for:each={messages} for:item="msg">
                    <div key={msg.id} class={msg.rowClass}>
                        <template if:true={msg.isAgent}>
                            <img class="msg-avatar" src={lisaAvatarUrl} alt="Lisa" />
                        </template>
                        <div class="bubble-wrap">
                            <div class="bubble">
                                <p class="bubble-text">{msg.text}</p>
                                <span class="bubble-time">{msg.time}</span>
                            </div>
                        </div>
                    </div>

                    <!-- MeterCapture widget -->
                    <template if:true={msg.hasMeterCapture}>
                        <template if:false={msg.meterDone}>
                            <div key={msg.id} class="meter-widget">
                                <p class="widget-label">Meter number (EAN)</p>
                                <input
                                    class="ean-input"
                                    type="text"
                                    placeholder="33349975"
                                    maxlength="18"
                                    value={eanValue}
                                    oninput={handleEanInput}
                                />
                                <p class="widget-label" style="margin-top:10px">Current reading</p>
                                <div class="reading-row">
                                    <input
                                        class="reading-input"
                                        type="number"
                                        inputmode="numeric"
                                        placeholder="53095"
                                        min="0"
                                        max="999999"
                                        value={readingValue}
                                        oninput={handleReadingInput}
                                    />
                                    <span class="reading-unit">kWh</span>
                                </div>
                                <button
                                    class="confirm-btn"
                                    onclick={handleMeterConfirm}
                                    disabled={isMeterConfirmDisabled}
                                >
                                    Confirm reading
                                </button>
                            </div>
                        </template>
                    </template>

                    <!-- WhatsApp reminder widget -->
                    <template if:true={msg.hasWhatsApp}>
                        <template if:false={msg.whatsAppDone}>
                            <div key={msg.id} class="wa-widget">
                                <button class="wa-btn wa-yes" data-answer="yes" onclick={handleWhatsApp}>
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
                                    </svg>
                                    Yes, remind me on WhatsApp
                                </button>
                                <button class="wa-btn wa-no" data-answer="no" onclick={handleWhatsApp}>
                                    No thanks
                                </button>
                            </div>
                        </template>
                    </template>
                </template>

                <!-- Typing indicator -->
                <template if:true={isTyping}>
                    <div class="msg-row agent">
                        <img class="msg-avatar" src={lisaAvatarUrl} alt="Lisa" />
                        <div class="bubble-wrap">
                            <div class="bubble typing-bubble">
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                        </div>
                    </div>
                </template>

            </div>

            <!-- Input -->
            <div class="chat-input-area">
                <input
                    type="text"
                    class="chat-input"
                    placeholder={inputPlaceholder}
                    value={inputValue}
                    oninput={handleInputChange}
                    onkeydown={handleKeyDown}
                    disabled={isInputDisabled}
                />
                <button class="send-btn" onclick={handleSend} disabled={isSendDisabled} aria-label="Send">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <!-- Footer -->
            <div class="chat-footer">
                <span>Powered by</span>
                <span class="sf-badge">&#9889; Agentforce</span>
            </div>

        </div>
    </template>

    <!-- Floating launcher -->
    <button class="chat-launcher" onclick={handleLauncherToggle} aria-label={launcherLabel}>
        <template if:true={showLauncherBadge}>
            <span class="launcher-badge"></span>
        </template>
        <template if:true={isOpen}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </template>
        <template if:true={isLauncherClosed}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                      fill="rgba(255,255,255,0.15)"/>
            </svg>
        </template>
    </button>
</template>
